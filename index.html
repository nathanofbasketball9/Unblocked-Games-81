<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games 81 | Official Site (unblocked-games-81.com)</title>
    <meta name="description" content="Play the best premium unblocked games at Unblocked Games 81. Fast, simple, and always up-to-date.">
    <link rel="canonical" href="https://unblocked-games-81.com" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --neon-purple: #9d50bb;
            --neon-blue: #6e72fc;
            --dark-bg: #0a0a0c;
            --dark-card: #15151a;
        }

        body {
            background-color: var(--dark-bg);
            color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-glow {
            box-shadow: 0 0 20px rgba(110, 114, 252, 0.3);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .game-iframe-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 1.5rem;
            overflow: hidden;
        }

        .game-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .hero-gradient {
            background: linear-gradient(135deg, rgba(157, 80, 187, 0.2), rgba(110, 114, 252, 0.2));
        }
    </style>
</head>
<body class="selection:bg-indigo-500/30 selection:text-indigo-400">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showHome()">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-indigo-500 flex items-center justify-center neon-glow">
                    <i data-lucide="gamepad-2" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-white to-white/60 bg-clip-text text-transparent">
                    Unblocked Games 81
                </h1>
            </div>

            <div class="relative group flex-1 max-w-md ml-8 hidden sm:block">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input
                    type="text"
                    id="searchBar"
                    placeholder="Search games..."
                    class="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:border-indigo-500/50 focus:ring-2 focus:ring-indigo-500/20 transition-all text-sm"
                >
            </div>

            <div class="hidden md:flex items-center gap-6 ml-8 text-sm font-medium text-gray-400">
                <button class="hover:text-white transition-colors">Trending</button>
                <button class="hover:text-white transition-colors">New</button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="mainContent" class="pt-28 pb-20">
        <!-- Views will be injected here -->
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6 text-sm text-gray-500">
            <p>© 2026 Unblocked Games 81 (unblocked-games-81.com). All games are property of their respective owners.</p>
            <div class="flex gap-8">
                <a href="#" class="hover:text-white transition-colors">Privacy</a>
                <a href="#" class="hover:text-white transition-colors">Terms</a>
            </div>
        </div>
    </footer>

    <!-- Templates -->
    <template id="homeTemplate">
        <div class="px-6 max-w-7xl mx-auto">
            <!-- Hero Section -->
            <section class="mb-16 relative rounded-[40px] overflow-hidden p-8 md:p-12 hero-gradient ring-1 ring-white/5">
                <div class="relative z-10 max-w-2xl">
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-xs font-bold text-indigo-400 mb-6 tracking-wide uppercase">
                        <i data-lucide="sparkles" class="w-3 h-3"></i>
                        V1.0 LIVE: Featuring 50+ Classics
                    </div>
                    <h2 class="text-4xl md:text-6xl font-bold mb-6 tracking-tight leading-tight">
                        Level Up Your <br />
                        <span class="bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent">Gaming Experience.</span>
                    </h2>
                    <p class="text-lg text-gray-400 mb-8 max-w-lg leading-relaxed">
                        Unblocked Games 81 is your portal to high-quality, lag-free web gaming. Curated for performance and accessibility.
                    </p>
                </div>
                <div class="absolute top-1/2 right-[-10%] -translate-y-1/2 w-[60%] aspect-square rounded-full bg-indigo-500/10 blur-[100px] pointer-events-none"></div>
            </section>

            <!-- Library Section -->
            <section>
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10 border-b border-white/5 pb-8">
                    <h3 class="text-3xl font-bold tracking-tight">Explore Library</h3>
                    <div id="categoryBar" class="flex items-center gap-3 overflow-x-auto pb-2 no-scrollbar">
                        <!-- Categories injected here -->
                    </div>
                </div>

                <div id="categoriesContainer" class="space-y-16">
                    <!-- Categorized rows injected here -->
                </div>

                <div id="noResults" class="hidden text-center py-24 glass rounded-3xl">
                    <p class="text-gray-500 text-lg">No games found matches your search.</p>
                </div>
            </section>
        </div>
    </template>

    <template id="playerTemplate">
        <div class="px-6 max-w-6xl mx-auto flex flex-col gap-6">
            <div class="flex items-center justify-between">
                <button onclick="showHome()" class="flex items-center gap-2 text-gray-400 hover:text-indigo-400 transition-colors group">
                    <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
                    <span>Back to Library</span>
                </button>
                <div class="flex items-center gap-4 text-gray-400">
                    <button class="hover:text-white" onclick="location.reload()"><i data-lucide="rotate-ccw" class="w-5 h-5"></i></button>
                    <button class="hover:text-white" onclick="toggleFullscreen()"><i data-lucide="maximize" class="w-5 h-5"></i></button>
                </div>
            </div>

            <div class="game-iframe-container glass ring-1 ring-white/10 shadow-2xl">
                <iframe id="gameIframe" src="" class="game-iframe" allow="fullscreen; autoplay; gamepad; focus-without-user-activation *" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-presentation allow-scripts allow-same-origin allow-downloads allow-popups allow-popups-to-escape-sandbox"></iframe>
            </div>

            <div class="bg-[#15151a] p-8 rounded-3xl border border-white/5 flex flex-col md:flex-row justify-between gap-8">
                <div class="flex-1">
                    <div class="flex items-center gap-3 mb-4">
                        <h2 id="playerGameTitle" class="text-3xl font-bold text-white">Game Title</h2>
                        <span id="playerGameCategory" class="px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-400 text-xs font-bold ring-1 ring-indigo-500/20">Category</span>
                    </div>
                    <p id="playerGameDesc" class="text-gray-400 max-w-2xl leading-relaxed"></p>
                </div>
                <div class="flex flex-col gap-3 min-w-[200px]">
                    <button onclick="popOut()" class="w-full h-12 rounded-xl bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-bold flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/20 active:scale-95 transition-transform">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                        POP OUT PLAYER
                    </button>
                </div>
            </div>
        </div>
    </template>

    <script type="module" src="/main.js"></script>
</body>
</html>
